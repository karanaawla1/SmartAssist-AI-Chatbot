<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
    <title>SmartAssist - AI Chatbot</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* WELCOME SCREEN */

        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at top, #1a0533 0%, #0d0d1a 70%);
            position: relative;
            overflow: hidden;
        }

        /* Background glow circles */
        .welcome-screen::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        .welcome-screen::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(88, 28, 135, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        /* Robot container */
        .robot-wrapper {
            position: relative;
            z-index: 10;
            margin-bottom: 30px;
        }

        .robot-body {
            font-size: 100px;
            display: block;
            animation: float-robot 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.6));
            cursor: pointer;
            transition: filter 0.3s;
        }

        .robot-body:hover {
            filter: drop-shadow(0 0 50px rgba(139, 92, 246, 0.9));
        }

        /* Robot waving hand */
        .robot-hand {
            position: absolute;
            font-size: 36px;
            top: 10px;
            right: -20px;
            animation: wave-hand 1.5s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes wave-hand {
            0%, 100% { transform: rotate(0deg); }
            25%       { transform: rotate(20deg); }
            75%       { transform: rotate(-10deg); }
        }

        @keyframes float-robot {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-15px); }
        }

        /* Speech bubble */
        .speech-bubble {
            position: absolute;
            top: -20px;
            left: -130px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 16px 16px 4px 16px;
            padding: 10px 16px;
            font-size: 13px;
            color: #c4b5fd;
            white-space: nowrap;
            backdrop-filter: blur(10px);
            animation: bubble-pop 0.5s ease 0.8s both;
        }

        @keyframes bubble-pop {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Welcome text */
        .welcome-title {
            font-size: 42px;
            font-weight: 700;
            text-align: center;
            z-index: 10;
            line-height: 1.2;
        }

        .welcome-title span {
            background: linear-gradient(135deg, #a78bfa, #7c3aed, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #9ca3af;
            margin-top: 12px;
            text-align: center;
            z-index: 10;
        }

        /* Get Started button */
        .get-started-btn {
            margin-top: 40px;
            padding: 16px 48px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            z-index: 10;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
            letter-spacing: 0.5px;
        }

        .get-started-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.6);
        }

        .get-started-btn:active {
            transform: translateY(0px);
        }

        /* Shimmer on button */
        .get-started-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0%   { left: -100%; }
            100% { left: 200%; }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        /* =====================
           CHAT SCREEN
        ===================== */

        .chat-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #0d0d1a;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #1a0533, #12011f);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .header-robot {
            font-size: 36px;
            animation: float-robot 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));
        }

        .header-info h2 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info p {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .status-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #a78bfa;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #a78bfa;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(1.4); }
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 10px;
        }

        /* Message row */
        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: slide-up 0.35s ease;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        /* Avatars */
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .avatar.bot {
            background: linear-gradient(135deg, #4c1d95, #7c3aed);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
        }

        .avatar.user {
            background: linear-gradient(135deg, #5b21b6, #a78bfa);
        }

        /* Message bubbles */
        .message-bubble {
            max-width: 68%;
            padding: 13px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message-bubble.bot {
            background: linear-gradient(135deg, #1e1040, #2d1b69);
            color: #e2d9f3;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .message-bubble.user {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        /* Typing dots */
        .typing-bubble {
            background: linear-gradient(135deg, #1e1040, #2d1b69);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            padding: 16px 20px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-bubble span {
            width: 7px;
            height: 7px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce-dot 1.2s infinite;
        }

        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce-dot {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50%       { transform: translateY(-7px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: linear-gradient(135deg, #1a0533, #12011f);
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        .input-area input:focus {
            border-color: #7c3aed;
            background: rgba(139, 92, 246, 0.15);
        }

        .input-area input::placeholder {
            color: rgba(167, 139, 250, 0.4);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
        }

        .send-btn:disabled {
            background: #2d2d4a;
            box-shadow: none;
            cursor: not-allowed;
            transform: scale(1);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

    </style>
</head>
<body>

    <!-- ===================== WELCOME SCREEN ===================== -->
    <div class="welcome-screen" id="welcomeScreen">

        <!-- Floating particles -->
        <div class="particle" style="left:10%; animation-duration:8s; animation-delay:0s;"></div>
        <div class="particle" style="left:25%; animation-duration:6s; animation-delay:1s; width:6px; height:6px;"></div>
        <div class="particle" style="left:50%; animation-duration:10s; animation-delay:2s;"></div>
        <div class="particle" style="left:70%; animation-duration:7s; animation-delay:0.5s; width:3px; height:3px;"></div>
        <div class="particle" style="left:85%; animation-duration:9s; animation-delay:1.5s;"></div>
        <div class="particle" style="left:40%; animation-duration:5s; animation-delay:3s; width:5px; height:5px;"></div>

        <!-- Robot with waving hand -->
        <div class="robot-wrapper">
            <span class="robot-body">🤖</span>
            <span class="robot-hand">👋</span>
            <div class="speech-bubble">Need any help? 😊</div>
        </div>

        <!-- Title -->
        <h1 class="welcome-title">
            Meet <span>SmartAssist!</span>
        </h1>
        <p class="welcome-subtitle">Your personal AI-powered chatbot</p>

        <!-- Button -->
        <button class="get-started-btn" onclick="goToChat()">
            Get Started &nbsp; ›››
        </button>

    </div>

    <!-- ===================== CHAT SCREEN ===================== -->
    <div class="chat-screen" id="chatScreen">

        <!-- Header -->
        <div class="chat-header">
            <span class="header-robot">🤖</span>
            <div class="header-info">
                <h2>SmartAssist</h2>
                <p>AI Powered Chatbot</p>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Online
            </div>
        </div>

        <!-- Messages -->
        <div class="messages-area" id="messagesArea"></div>

        <!-- Input -->
        <div class="input-area">
            <input
                type="text"
                id="userInput"
                placeholder="Ask me anything..."
                onkeypress="handleKey(event)"
            />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                </svg>
            </button>
        </div>

    </div>

    <script>

        const sessionId = "user_" + Math.random().toString(36).substr(2, 9);

        // Welcome screen → Chat screen
        function goToChat() {
            const welcome = document.getElementById("welcomeScreen");
            const chat    = document.getElementById("chatScreen");

            welcome.style.transition = "opacity 0.6s ease, transform 0.6s ease";
            welcome.style.opacity    = "0";
            welcome.style.transform  = "scale(0.95)";

            setTimeout(() => {
                welcome.style.display = "none";
                chat.style.display    = "flex";
                chat.style.opacity    = "0";
                chat.style.transition = "opacity 0.5s ease";

                setTimeout(() => {
                    chat.style.opacity = "1";
                    showBotGreeting();
                    document.getElementById("userInput").focus();
                }, 50);
            }, 600);
        }

        // Bot greeting when chat opens
        function showBotGreeting() {
            const greetings = [
                "Hey there! 👋 I'm SmartAssist. Ask me anything!",
                "Hello! 🤖 I'm ready to help. What's on your mind?",
                "Hi! 😊 SmartAssist here — what would you like to know?"
            ];
            const msg = greetings[Math.floor(Math.random() * greetings.length)];
            appendMessage(msg, "bot");
        }

        function handleKey(event) {
            if (event.key === "Enter") sendMessage();
        }

        async function sendMessage() {
            const input   = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");
            const message = input.value.trim();

            if (!message) return;

            appendMessage(message, "user");
            input.value   = "";
            sendBtn.disabled = true;

            const typingEl = showTyping();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sessionId, message })
                });
                const data = await response.json();
                typingEl.remove();
                appendMessage(data.reply, "bot");
            } catch (error) {
                typingEl.remove();
                appendMessage("Something went wrong. Please try again! 😔", "bot");
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function appendMessage(text, type) {
            const area = document.getElementById("messagesArea");

            const row = document.createElement("div");
            row.className = `message-row ${type}`;

            const avatar = document.createElement("div");
            avatar.className = `avatar ${type}`;
            avatar.innerText = type === "bot" ? "🤖" : "👤";

            const bubble = document.createElement("div");
            bubble.className = `message-bubble ${type}`;
            bubble.innerText = text;

            row.appendChild(avatar);
            row.appendChild(bubble);
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;

            return row;
        }

        function showTyping() {
            const area = document.getElementById("messagesArea");

            const row = document.createElement("div");
            row.className = "message-row bot";

            const avatar = document.createElement("div");
            avatar.className = "avatar bot";
            avatar.innerText = "🤖";

            const dots = document.createElement("div");
            dots.className = "typing-bubble";
            dots.innerHTML = "<span></span><span></span><span></span>";

            row.appendChild(avatar);
            row.appendChild(dots);
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;

            return row;
        }

    </script>

</body>
</html>
